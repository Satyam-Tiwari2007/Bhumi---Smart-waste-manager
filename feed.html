<!DOCTYPE html>
<html>
<head>
  <title>Bhumi Feed</title>
  <style>
    body {
      font-family: Arial;
      background: #f6fbf6;
      margin: 0;
      padding: 20px;
    }

    h2 {
      color: #166534;
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    .card img {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 12px;
    }

    .info {
      margin-top: 10px;
    }

    .location {
      font-weight: bold;
      color: #166534;
    }

    .desc {
      margin-top: 5px;
    }
  </style>
</head>
<body>

<h2>🌍 Bhumi Community Feed</h2>

<div class="container" id="feed">Loading...</div>

<script>
async function loadFeed() {
  try {
    const res = await fetch("http://localhost:5000/feed");
    const data = await res.json();

    let html = "";

    data.forEach(item => {
      html += `
        <div class="card">
          <img src="http://localhost:5000/${item.image}" />
          <div class="info">
            <div class="location">📍 ${item.location}</div>
            <div class="desc">${item.description}</div>
          </div>
        </div>
      `;
    });

    document.getElementById("feed").innerHTML =
      html || "No data available";

  } catch (err) {
    document.getElementById("feed").innerText = "Error loading feed";
  }
}

loadFeed();
</script>

</body>
</html>
