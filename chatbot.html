<!DOCTYPE html>
<html>
<head>
  <title>Bhumi AI Chatbot</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f6fbf6;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      background: #166534;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .msg {
      margin: 10px 0;
      max-width: 70%;
      padding: 10px;
      border-radius: 10px;
    }

    .user {
      background: #166534;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: white;
      border: 1px solid #ddd;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: white;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ddd;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      background: #166534;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="header">🤖 Bhumi AI Assistant</div>

<div class="chat" id="chat"></div>

<div class="input-box">
  <input id="input" placeholder="Ask about waste..." />
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const msg = input.value.trim();

  if (!msg) return;

  const chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg user">${msg}</div>`;

  input.value = "";

  const res = await fetch("http://localhost:5000/chatbot", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  chat.innerHTML += `<div class="msg bot">${data.reply.replace(/\n/g,"<br>")}</div>`;

  chat.scrollTop = chat.scrollHeight;
}

// Enter key
document.getElementById("input").addEventListener("keypress", function(e){
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
