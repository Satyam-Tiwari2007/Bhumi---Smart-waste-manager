<!DOCTYPE html>
<html>
<head>
  <title>Bhumi Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6fbf6;
    }

    .sidebar {
      width: 220px;
      background: #166534;
      color: white;
      height: 100vh;
      position: fixed;
      padding: 20px;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 15px 0;
      cursor: pointer;
    }

    .main {
      margin-left: 240px;
      padding: 30px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .num {
      font-size: 40px;
      font-weight: bold;
      color: #166534;
    }

    .records {
      margin-top: 30px;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .activity {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    .activity img {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      object-fit: cover;
    }

    /* Chatbot */
    #chatbox {
      height: 250px;
      overflow-y: auto;
      border: 1px solid #eee;
      padding: 10px;
      border-radius: 10px;
      background: #f9f9f9;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>🌍 Bhumi</h2>
  <a href="feed.html">Bhumi Media</a>
  <a href="reuseAI.html">AI Reuse</a>
  <a href="index.html">Upload Waste</a>
  <a href="chatbot.html">AI Chatbot 🤖</a>
  <a onclick="logout()">Logout</a>
</div>

<div class="main">
  <h1>Welcome Back 👋</h1>
  <p>Your personal environmental dashboard</p>

  <div class="stats">
    <div class="card">
      <p>Total Reports</p>
      <div class="num" id="reports">0</div>
    </div>

    <div class="card">
      <p>Total Contributions</p>
      <div class="num" id="contributions">0</div>
    </div>

    <div class="card">
      <p>Stars Won ⭐</p>
      <div class="num" id="stars">0</div>
    </div>

    <div class="card">
      <p>AI Reuse Actions</p>
      <div class="num" id="reuse">0</div>
    </div>
  </div>

  <!-- Activity -->
  <div class="records">
    <h3>My Recent Activity</h3>
    <div id="records">Loading...</div>
  </div>

  <!-- Chatbot -->
  <div class="records">
    <h3>🤖 Bhumi AI Assistant</h3>

    <div id="chatbox"></div>

    <div style="display:flex; margin-top:10px;">
      <input id="chatInput" placeholder="Ask about waste..."
        style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;">
      <button onclick="sendMessage()"
        style="margin-left:10px; padding:10px; background:#166534; color:white; border:none; border-radius:10px;">
        Send
      </button>
    </div>
  </div>

</div>

<script>
async function loadDashboard() {
  const user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const res = await fetch(`http://localhost:5000/dashboard/${user._id}`);
  const data = await res.json();

  document.getElementById("reports").innerText = data.reports;
  document.getElementById("contributions").innerText = data.contributions;
  document.getElementById("stars").innerText = data.stars;
  document.getElementById("reuse").innerText = data.stars;

  let html = "";

  data.recent.forEach(item => {
    html += `
      <div class="activity">
        <img src="http://localhost:5000/${item.image}" />
        <div>
          <p><b>📍 ${item.location}</b></p>
          <p>${item.description}</p>
        </div>
      </div>
    `;
  });

  document.getElementById("records").innerHTML =
    html || "No uploads yet";
}

// 🤖 CHATBOT FUNCTION
async function sendMessage() {
  const input = document.getElementById("chatInput");
  const msg = input.value.trim();

  if (!msg) return;

  const chatbox = document.getElementById("chatbox");

  // user message
  chatbox.innerHTML += `
    <div style="text-align:right; margin:5px;">
      <span style="background:#166534;color:white;padding:8px 12px;border-radius:10px;">
        ${msg}
      </span>
    </div>
  `;

  input.value = "";

  try {
    const res = await fetch("http://localhost:5000/chatbot", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();

    chatbox.innerHTML += `
      <div style="text-align:left; margin:5px;">
        <span style="background:white;padding:8px 12px;border-radius:10px;border:1px solid #ddd;">
          ${data.reply.replace(/\n/g, "<br>")}
        </span>
      </div>
    `;

  } catch (err) {
    chatbox.innerHTML += `<div style="color:red;">Error connecting</div>`;
  }

  chatbox.scrollTop = chatbox.scrollHeight;
}

// Enter key support
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("chatInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
  });
});

function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

loadDashboard();
</script>

</body>
</html>
